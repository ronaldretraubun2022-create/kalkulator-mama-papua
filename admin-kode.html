<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manajemen Kode User</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="./css/styles.css?v=6" />
  </head>
  <body class="min-h-screen bg-[linear-gradient(135deg,#0f0f0f_0%,#1a1110_40%,#102117_100%)] text-[#fff7d6]">
    <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6">
      <header class="mb-6 flex flex-wrap items-center justify-between gap-3">
        <h1 class="text-2xl font-black text-mama-gold">Manajemen Kode User</h1>
        <a href="./admin.html" class="rounded-xl bg-mama-gold px-4 py-2 text-sm font-black text-black">Kembali Admin</a>
      </header>

      <section class="mb-4 grid gap-3 md:grid-cols-5">
        <input id="kodeUser" class="field-input md:col-span-1" placeholder="MAMA-0001" />
        <input id="namaUser" class="field-input md:col-span-1" placeholder="Nama User" />
        <input id="noHp" class="field-input md:col-span-1" placeholder="No HP" />
        <input id="lokasi" class="field-input md:col-span-1" placeholder="Lokasi" />
        <div class="flex gap-2 md:col-span-1">
          <button id="generateBtn" class="action-button flex-1 bg-mama-green text-[#fff7d6]">Generate</button>
          <button id="saveBtn" class="action-button flex-1 bg-mama-gold text-black">Simpan</button>
        </div>
      </section>

      <section class="overflow-auto rounded-2xl border border-[#F2D479]/30 bg-[#0f0f0f]/40">
        <table class="min-w-full text-sm">
          <thead class="bg-[#1a1110] text-mama-gold">
            <tr>
              <th class="px-3 py-2 text-left">kode_user</th>
              <th class="px-3 py-2 text-left">nama_user</th>
              <th class="px-3 py-2 text-left">no_hp</th>
              <th class="px-3 py-2 text-left">lokasi</th>
              <th class="px-3 py-2 text-left">aktif</th>
              <th class="px-3 py-2 text-left">Aksi</th>
            </tr>
          </thead>
          <tbody id="kodeRows"></tbody>
        </table>
      </section>
    </main>
    <script src="./js/supabase.js?v=1"></script>
    <script src="./js/admin-kode.js?v=1"></script>
  </body>
  </html>
